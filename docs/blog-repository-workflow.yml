name: Publish Blog

on:
  push:
    branches: [main]
    paths:
      - "publish/**"
      - "preview/**"
      - "assets/**"
  workflow_dispatch:

jobs:
  notify-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homepage rebuild
        env:
          HOMEPAGE_REPO: carp84/carp84.github.io
          HOMEPAGE_TOKEN: ${{ secrets.HOMEPAGE_REPO_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${HOMEPAGE_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${HOMEPAGE_REPO}/dispatches" \
            -d '{"event_type":"blog_publish"}'

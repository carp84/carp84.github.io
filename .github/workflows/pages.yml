name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [blog_publish]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BLOG_REPO: ${{ secrets.BLOG_REPO }}
      BLOG_REPO_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Checkout published blog posts
        if: ${{ env.BLOG_REPO != '' && env.BLOG_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BLOG_REPO }}
          token: ${{ env.BLOG_REPO_TOKEN }}
          path: blog-source
          sparse-checkout: publish
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build site
        run: node scripts/build.mjs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
